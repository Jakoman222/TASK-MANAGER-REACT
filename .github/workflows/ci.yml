  e2e-tests:
    name: Playwright - Pruebas E2E
    runs-on: ubuntu-latest

    env:
      VITE_API_URL: ${{ vars.VITE_API_URL }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: ./package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar dependencias frontend
        run: npm ci --prefix frontend

      - name: Verificar URL del backend
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "VITE_API_URL no está configurada"
            exit 1
          fi

      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium

      - name: Ejecutar pruebas E2E
        run: npx playwright test --project=chromium

      - name: Guardar reporte de Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

# Verificar que programa funciona con las variables SECRETS
  verificar-database-url:
    name: Verificar DATABASE_URL
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ./backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar que DATABASE_URL existe
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL no fue cargada"
            exit 1
          fi

          echo "DATABASE_URL fue cargada correctamente"

      - name: Generar Prisma Client
        run: npx prisma generate

      - name: Comprobar conexión con la base de datos
        run: npx prisma migrate status